services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opentryrw}
      POSTGRES_USER: ${POSTGRES_USER:-opentryrw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - opentryrw-postgres:/var/lib/postgresql/data

  opentryrw:
    image: ${OPENTRYRW_IMAGE:?OPENTRYRW_IMAGE is required}
    restart: unless-stopped
    command:
      - uvicorn
      - opentryrw.api:app
      - --host
      - 0.0.0.0
      - --port
      - "4174"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    env_file:
      - path: .env
        required: false
    environment:
      STORAGE_BACKEND: postgres
      RUN_MIGRATIONS: "true"
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-opentryrw}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opentryrw}}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4174"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:4174/api/health', timeout=5)); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - opentryrw-data:/app/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:?CADDY_SITE_ADDRESS is required}
    depends_on:
      opentryrw:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:2019/config/ >/dev/null || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  opentryrw-worker:
    image: ${OPENTRYRW_IMAGE:?OPENTRYRW_IMAGE is required}
    restart: unless-stopped
    command: ["python", "-m", "opentryrw.worker"]
    env_file:
      - path: .env
        required: false
    environment:
      STORAGE_BACKEND: postgres
      RUN_MIGRATIONS: "false"
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-opentryrw}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opentryrw}}
    depends_on:
      postgres:
        condition: service_healthy
      opentryrw:
        condition: service_healthy
    volumes:
      - opentryrw-data:/app/data

volumes:
  caddy-config:
  caddy-data:
  opentryrw-data:
  opentryrw-postgres:
